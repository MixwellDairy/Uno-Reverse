<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>uno-reverse · Control Panel</title>
  <link rel="stylesheet" href="https://unpkg.com/easymde/dist/easymde.min.css">
  <script src="https://unpkg.com/easymde/dist/easymde.min.js"></script>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121a33;
      --text: #e9eeff;
      --muted: #9eb0e0;
      --accent: #6ea8fe;
      --danger: #ff7a7a;
      --ok: #72e39a;
      --border: #25315f;
      --radius: 14px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, Segoe UI, Roboto, Arial;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .wrap {
      max-width: 1200px;
      margin: 20px auto;
      padding: 0 16px;
      flex: 1;
      width: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .topbar {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 18px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      flex-shrink: 0;
    }
    .status { margin-left: auto; display:flex; align-items:center; gap:14px; }
    .dot { width:10px; height:10px; border-radius:50%; background:var(--danger); }
    .dot.connected { background:var(--ok); }
    .grid {
      display:grid;
      grid-template-columns:300px 1fr;
      gap:16px;
      flex: 1;
      min-height: 0;
    }
    .card {
      background: var(--panel);
      border:1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .list { overflow-y: auto; padding: 10px; flex: 1; }
    .item {
      border:1px solid var(--border);
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 8px;
      cursor: pointer;
    }
    .item.active { border-color: var(--accent); background: rgba(110,168,254,0.1); }
    .chat-body { flex: 1; overflow-y: auto; padding: 16px; background: rgba(0,0,0,0.2); }
    .bubble { max-width: 92%; padding: 10px; border-radius: 10px; margin: 8px 0; }
    .bubble.user { background: var(--border); }
    .bubble.meta { background: rgba(110,168,254,0.15); border: 1px solid rgba(110,168,254,0.35); }
    .composer { padding: 12px; border-top: 1px solid var(--border); }
    textarea {
      width: 100%;
      height: 100px;
      background: #0d1430;
      color: white;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      font-family: Inter, ui-sans-serif, system-ui, Segoe UI, Roboto, Arial;
      resize: vertical;
    }
    .btn {
      padding: 8px 16px;
      background: var(--accent);
      color: #0b1020;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }
    .btn:disabled { opacity: 0.5; }
    .toolbtn {
      border:1px solid var(--border);
      background:#1a254a;
      color:var(--text);
      border-radius:6px;
      padding:6px 10px;
      cursor:pointer;
    }
    .toolbtn:hover { background:#243060; }
    .context-block {
      margin-top: 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(255,255,255,0.03);
      padding: 10px;
      white-space: pre-wrap;
      font-size: 13px;
      color: var(--muted);
    }
    .history-block {
      margin-bottom: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.2);
      max-height: 300px;
      overflow-y: auto;
      padding: 10px;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .history-msg {
      padding: 6px 10px;
      border-radius: 6px;
      max-width: 90%;
    }
    .history-msg .msg-content {
      display: -webkit-box;
      -webkit-line-clamp: 5;
      -webkit-box-orient: vertical;
      overflow: hidden;
      cursor: pointer;
    }
    .history-msg.expanded .msg-content {
      -webkit-line-clamp: unset;
    }
    .history-msg.user {
      background: var(--border);
      align-self: flex-start;
    }
    .history-msg.assistant {
      background: rgba(110, 168, 254, 0.1);
      border: 1px solid rgba(110, 168, 254, 0.2);
      align-self: flex-end;
    }
    .history-fallback {
      text-align: center;
      padding: 20px;
      color: var(--muted);
      font-style: italic;
    }
    .attachments { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
    .attachment {
      border:1px solid var(--border);
      border-radius:999px;
      padding:4px 10px;
      font-size:12px;
      color: var(--muted);
    }
    .muted { color: var(--muted); }
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(2, 6, 18, 0.7);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 1000;
    }
    .modal {
      width: min(860px, 100%);
      max-height: 90vh;
      overflow: auto;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
    }
    .modal textarea { height: 120px; }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    /* EasyMDE Dark Theme Overrides */
    .EasyMDEContainer .CodeMirror {
      background: #0d1430;
      color: var(--text);
      border-color: var(--border);
      border-bottom-left-radius: 8px;
      border-bottom-right-radius: 8px;
    }
    .EasyMDEContainer .editor-toolbar {
      background: var(--panel);
      border-color: var(--border);
      border-top-left-radius: 8px;
      border-top-right-radius: 8px;
      opacity: 0.8;
    }
    .EasyMDEContainer .editor-toolbar i { color: var(--text); }
    .EasyMDEContainer .editor-toolbar a:hover,
    .EasyMDEContainer .editor-toolbar a.active {
      background: var(--border);
      border-color: var(--accent);
    }
    .EasyMDEContainer .editor-preview {
      background: #0b1020;
      color: var(--text);
    }
    .EasyMDEContainer .CodeMirror-cursor { border-left: 2px solid var(--accent); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div style="font-weight:bold">uno-reverse</div>
      <div class="status">
        <label id="skipSystemTasksLabel" style="display:flex; align-items:center; gap:6px; cursor:pointer; font-size:13px; color:var(--muted)" title="Automatically respond to system prompts with default values.">
          <input type="checkbox" id="skipSystemTasks" style="cursor:pointer" />
          <span>Skip System Tasks</span>
        </label>
        <div style="display:flex; align-items:center; gap:8px">
          <div id="statusDot" class="dot"></div>
          <span id="statusText">Connecting…</span>
        </div>
      </div>
    </div>
    <div class="grid">
      <div class="card">
        <div style="padding:10px; border-bottom:1px solid var(--border)">Pending (<span id="count">0</span>)</div>
        <div id="list" class="list"></div>
      </div>
      <div class="card">
        <div id="chatHistory" class="history-block" style="margin: 10px; flex-shrink: 0; display: none;"></div>
        <div id="chat" class="chat-body" style="display:flex; flex-direction:column"></div>
        <div id="chatAttachments" class="attachments" style="padding: 0 16px 8px 16px; background: rgba(0,0,0,0.2);"></div>
        <div class="composer">
          <textarea id="reply" placeholder="Type AI response..." disabled></textarea>
          <div style="margin-top:8px; text-align:right">
            <button id="send" class="btn" disabled>Send Reply</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div id="wrapperModalBackdrop" class="modal-backdrop">
      <div class="modal">
        <div id="wrapperModalHistory" class="history-block"></div>
        <div class="modal-header">
        <div>
          <div id="wrapperModalTitle" style="font-weight:700">System Task</div>
          <div id="wrapperModalInstruction" class="muted" style="font-size:13px"></div>
        </div>
        <button id="wrapperClose" class="toolbtn" type="button">Close</button>
      </div>
      <div id="wrapperModalContext" class="context-block"></div>
      <div id="wrapperModalAttachments" class="attachments"></div>
      <textarea id="wrapperReply" placeholder="Write response..." disabled></textarea>
      <div style="margin-top:8px; text-align:right">
        <button id="wrapperSubmit" class="btn" disabled>Submit Task</button>
      </div>
    </div>
  </div>
  <script>
    const listEl = document.getElementById('list');
    const chatEl = document.getElementById('chat');
    const chatHistoryEl = document.getElementById('chatHistory');
    const chatAttachmentsEl = document.getElementById('chatAttachments');
    const replyEl = document.getElementById('reply');
    const sendBtn = document.getElementById('send');
    const countEl = document.getElementById('count');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const wrapperModalBackdropEl = document.getElementById('wrapperModalBackdrop');
    const wrapperModalTitleEl = document.getElementById('wrapperModalTitle');
    const wrapperModalInstructionEl = document.getElementById('wrapperModalInstruction');
    const wrapperModalHistoryEl = document.getElementById('wrapperModalHistory');
    const wrapperModalContextEl = document.getElementById('wrapperModalContext');
    const wrapperModalAttachmentsEl = document.getElementById('wrapperModalAttachments');
    const wrapperCloseEl = document.getElementById('wrapperClose');
    const wrapperReplyEl = document.getElementById('wrapperReply');
    const wrapperSubmitEl = document.getElementById('wrapperSubmit');
    const skipSystemTasksEl = document.getElementById('skipSystemTasks');
    const skipSystemTasksLabelEl = document.getElementById('skipSystemTasksLabel');

    const chatMDE = new EasyMDE({
      element: replyEl,
      spellChecker: false,
      status: false,
      placeholder: 'Type Markdown and press Cmd+Enter/Ctrl+Enter to send...',
      extraKeys: {
        "Cmd-Enter": () => sendBtn.click(),
        "Ctrl-Enter": () => sendBtn.click(),
      },
    });

    const wrapperMDE = new EasyMDE({
      element: wrapperReplyEl,
      spellChecker: false,
      status: false,
      placeholder: 'Type Markdown and press Cmd+Enter/Ctrl+Enter to submit...',
      extraKeys: {
        "Cmd-Enter": () => wrapperSubmitEl.click(),
        "Ctrl-Enter": () => wrapperSubmitEl.click(),
      },
    });

    let items = new Map();
    let selectedId = null;
    let wrapperModalOpenFor = null;
    let wrapperModalDismissedFor = null;
    let ws;

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }


    function wrapperRequestHtml(sel) {
      const wrapper = sel.wrapper || {};
      return `
        <div class="bubble meta">
          <div style="font-weight:700; margin-bottom:6px">${escapeHtml(wrapper.label || 'System task')}</div>
          <div>${escapeHtml(wrapper.instruction || 'Complete this system task in the modal dialog.')}</div>
          <div style="margin-top:8px; color:var(--muted)">Open the task modal to submit the response.</div>
          <div style="margin-top:8px"><button id="openWrapperTaskBtn" class="toolbtn" type="button">Open Task Modal</button></div>
        </div>`;
    }

    function renderHistory(container, history) {
      if (!history || history.length === 0) {
        container.innerHTML = '<div class="history-fallback">⚠️ No chat history available</div>';
      } else {
        container.innerHTML = history.map(msg => `
          <div class="history-msg ${escapeHtml(msg.role)}">
            <div style="font-size:10px; opacity:0.6; margin-bottom:2px; font-weight:bold">${escapeHtml(msg.role.toUpperCase())}</div>
            <div class="msg-content">${escapeHtml(msg.content)}</div>
          </div>
        `).join('');
        // Scroll to bottom
        setTimeout(() => { container.scrollTop = container.scrollHeight; }, 0);
      }
    }

    function renderAttachments(container, attachments) {
      container.innerHTML = Array.isArray(attachments) && attachments.length
        ? attachments.map(a => {
            if (a.type === 'image' || a.type === 'image_url') {
                return `<div class="attachment" style="display:flex; flex-direction:column; gap:4px">
                    <span>🖼️ ${escapeHtml(a.name)}</span>
                    ${a.url ? `<img src="${a.url}" style="max-width:200px; max-height:200px; border-radius:4px" />` : ''}
                </div>`;
            }
            return `<span class="attachment">📎 ${escapeHtml(a.type)} · ${escapeHtml(a.name)}</span>`;
        }).join('')
        : '<span class="attachment">No attachments</span>';
    }

    function openWrapperModalForSelection(force = false) {
      const sel = items.get(selectedId);
      if (!sel || sel.kind !== 'wrapped_prompt') return;
      if (!force && wrapperModalOpenFor === sel.id) return;
      wrapperModalDismissedFor = null;

      const wrapper = sel.wrapper || {};
      wrapperModalOpenFor = sel.id;
      wrapperModalBackdropEl.style.display = 'flex';

      const history = wrapper.history || sel.history || [];
      console.log('SYSTEM_PROMPT: Rendering history for id:', sel.id, 'count:', history.length);
      renderHistory(wrapperModalHistoryEl, history);

      wrapperModalTitleEl.textContent = wrapper.label || 'System task';
      wrapperModalInstructionEl.textContent = wrapper.instruction || 'Complete this system task.';

      wrapperModalContextEl.textContent = wrapper.context || 'No chat context provided.';
      renderAttachments(wrapperModalAttachmentsEl, wrapper.attachments || sel.attachments);

      const placeholders = {
          title: 'Enter chat title (e.g. 📊 Market Research)',
          follow_up: 'Enter follow-up questions, one per line...',
          tags: 'Enter tags, separated by commas...',
          search: 'Enter search queries, one per line...',
          system_generic: 'Enter response...'
      };

      const placeholder = placeholders[wrapper.type] || 'Write response...';
      const initialValue = Array.isArray(wrapper.suggested_value) ? wrapper.suggested_value.join('\n') : (wrapper.suggested_value || '');

      wrapperMDE.codemirror.setOption('placeholder', placeholder);
      wrapperMDE.value(initialValue);
      wrapperMDE.codemirror.setOption('readOnly', false);
      wrapperSubmitEl.disabled = false;

      wrapperMDE.codemirror.focus();
      console.log('SYSTEM_PROMPT: Modal opened for id:', sel.id, 'type:', wrapper.type);
    }

    function closeWrapperModal(markDismissed = false) {
      if (markDismissed && selectedId) {
        wrapperModalDismissedFor = selectedId;
      }
      wrapperModalBackdropEl.style.display = 'none';
      wrapperModalOpenFor = null;
      wrapperMDE.value('');
      wrapperMDE.codemirror.setOption('readOnly', true);
      wrapperSubmitEl.disabled = true;
      wrapperModalHistoryEl.innerHTML = '';
    }

    function render() {
      const arr = [...items.values()].filter(i => !i.done).sort((a,b) => b.at - a.at);
      countEl.textContent = arr.length;
      listEl.innerHTML = arr.map(i => `
        <div class="item ${i.id === selectedId ? 'active' : ''}" onclick="select('${i.id}')">
          <div style="font-size:12px; opacity:0.7">${i.id}</div>
          <div style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis">${escapeHtml(i.kind === 'wrapped_prompt' ? (i.wrapper?.label || 'System task') : (i.prompt || ''))}</div>
        </div>
      `).join('');

      const sel = items.get(selectedId);
      if (sel && !sel.done) {
        chatEl.innerHTML = sel.kind === 'wrapped_prompt'
          ? wrapperRequestHtml(sel)
          : `<div class="bubble user">${escapeHtml(sel.prompt || '')}</div>`;

        if (sel.kind === 'wrapped_prompt') {
          chatMDE.codemirror.setOption('readOnly', true);
          sendBtn.disabled = true;
          chatMDE.value('');
          chatMDE.codemirror.setOption('placeholder', 'Use the task modal for this system prompt');
          chatHistoryEl.style.display = 'none';
          chatAttachmentsEl.style.display = 'none';
          if (wrapperModalOpenFor !== sel.id && wrapperModalDismissedFor !== sel.id) openWrapperModalForSelection();
        } else {
          wrapperModalDismissedFor = null;
          closeWrapperModal();
          chatMDE.codemirror.setOption('readOnly', false);
          sendBtn.disabled = false;
          chatMDE.codemirror.setOption('placeholder', 'Type Markdown and press Cmd+Enter/Ctrl+Enter to send...');

          chatHistoryEl.style.display = 'flex';
          renderHistory(chatHistoryEl, sel.history);

          chatAttachmentsEl.style.display = 'flex';
          renderAttachments(chatAttachmentsEl, sel.attachments);
        }
      } else {
        chatEl.innerHTML = '<div style="text-align:center; margin-top:50px; opacity:0.5">Select a request</div>';
        closeWrapperModal();
        chatMDE.codemirror.setOption('readOnly', true);
        sendBtn.disabled = true;
        chatMDE.value('');
        chatHistoryEl.style.display = 'none';
        chatAttachmentsEl.style.display = 'none';
      }

      const openBtn = document.getElementById('openWrapperTaskBtn');
      if (openBtn) openBtn.onclick = () => openWrapperModalForSelection(true);
    }

    window.select = (id) => {
      if (selectedId !== id) wrapperModalDismissedFor = null;
      selectedId = id;
      chatMDE.value('');
      render();
    };

    sendBtn.onclick = () => {
      const text = chatMDE.value().trim();
      if (!text || !selectedId) return;
      ws.send(JSON.stringify({ type: 'reply', id: selectedId, content: text }));
      chatMDE.value('');
    };

    skipSystemTasksEl.onchange = () => {
      ws.send(JSON.stringify({ type: 'toggle_skip', enabled: skipSystemTasksEl.checked }));
    };

    wrapperCloseEl.onclick = () => closeWrapperModal(true);
    wrapperModalBackdropEl.addEventListener('click', (e) => {
      if (e.target === wrapperModalBackdropEl) closeWrapperModal(true);
    });

    wrapperModalHistoryEl.addEventListener('click', (e) => {
      const msg = e.target.closest('.history-msg');
      if (msg) msg.classList.toggle('expanded');
    });

    wrapperSubmitEl.onclick = async () => {
      const sel = items.get(selectedId);
      if (!sel || sel.kind !== 'wrapped_prompt') return;
      const text = wrapperMDE.value().trim();

      wrapperSubmitEl.disabled = true;
      wrapperMDE.codemirror.setOption('readOnly', true);

      await submitOperatorReply(sel.id, text);
    };

    async function submitOperatorReply(id, content) {
      try {
        const resp = await fetch('/operator-reply', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id, content })
        });

        if (!resp.ok) {
            const err = await resp.json();
            throw new Error(err.error || 'Failed to submit');
        }
        console.log('SYSTEM_PROMPT: Reply submitted successfully for id:', id);
        if (wrapperModalOpenFor === id) closeWrapperModal();
      } catch (err) {
          console.error('SYSTEM_PROMPT: Error submitting reply:', err);
          if (wrapperModalOpenFor === id) {
            alert('Error: ' + err.message);
            wrapperSubmitEl.disabled = false;
            wrapperMDE.codemirror.setOption('readOnly', false);
          }
      }
    }

    function connect() {
      ws = new WebSocket((location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host);
      ws.onopen = () => { statusDot.className = 'dot connected'; statusText.textContent = 'Connected'; };
      ws.onclose = () => { statusDot.className = 'dot'; statusText.textContent = 'Disconnected'; setTimeout(connect, 2000); };
      ws.onmessage = (e) => {
        const m = JSON.parse(e.data);
        if (m.type === 'pending_list') { m.data.forEach(i => items.set(i.id, { ...i, at: Date.now() })); }
        if (m.type === 'skip_state') {
          skipSystemTasksEl.checked = !!m.enabled;
          if (m.locked) {
            skipSystemTasksEl.disabled = true;
            skipSystemTasksLabelEl.style.opacity = '0.5';
            skipSystemTasksLabelEl.querySelector('span').textContent = 'Skip System Tasks (Managed by Server)';
            skipSystemTasksLabelEl.title = 'This setting is locked by the server environment configuration.';
          } else {
            skipSystemTasksEl.disabled = false;
            skipSystemTasksLabelEl.style.opacity = '1';
            skipSystemTasksLabelEl.querySelector('span').textContent = 'Skip System Tasks';
            skipSystemTasksLabelEl.title = 'Automatically respond to system prompts. Note: This setting resets on server restart.';
          }
        }
        if (m.type === 'incoming') { items.set(m.id, { ...m, at: Date.now() }); if (!selectedId) selectedId = m.id; }
        if (m.type === 'system_prompt_request') {
          items.set(m.id, { ...m, at: Date.now() });
          selectedId = m.id;
        }
        if (['answered', 'expired', 'client_disconnected'].includes(m.type)) {
          const it = items.get(m.id); if(it) it.done = true;
          if(selectedId === m.id) selectedId = [...items.values()].find(i => !i.done)?.id || null;
        }
        render();
      };
    }
    connect();
  </script>
</body>
</html>
