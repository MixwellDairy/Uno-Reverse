<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>uno-reverse · Control Panel</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121a33;
      --text: #e9eeff;
      --muted: #9eb0e0;
      --accent: #6ea8fe;
      --accent-2: #7ef0c2;
      --danger: #ff7a7a;
      --ok: #72e39a;
      --border: #25315f;
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --radius: 14px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, Segoe UI, Roboto, Arial;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .wrap {
      max-width: 1200px;
      margin: 20px auto;
      padding: 0 16px;
      flex: 1;
      width: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .topbar {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 18px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      flex-shrink: 0;
    }
    .status { margin-left: auto; display:flex; align-items:center; gap:10px; }
    .dot { width:10px; height:10px; border-radius:50%; background:var(--danger); }
    .dot.connected { background:var(--ok); }
    .grid {
      display:grid;
      grid-template-columns:300px 1fr;
      gap:16px;
      flex: 1;
      min-height: 0;
    }
    .card {
      background: var(--panel);
      border:1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .list { overflow-y: auto; padding: 10px; flex: 1; }
    .item {
      border:1px solid var(--border);
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 8px;
      cursor: pointer;
    }
    .item.active { border-color: var(--accent); background: rgba(110,168,254,0.1); }
    .chat-body { flex: 1; overflow-y: auto; padding: 16px; background: rgba(0,0,0,0.2); }
    .bubble { max-width: 80%; padding: 10px; border-radius: 10px; margin: 8px 0; }
    .bubble.user { background: var(--border); }
    .bubble.ai { background: #12352f; align-self: flex-end; margin-left: auto; }
    .composer { padding: 12px; border-top: 1px solid var(--border); }
    textarea { width: 100%; height: 80px; background: #0d1430; color: white; border: 1px solid var(--border); border-radius: 8px; padding: 10px; }
    .btn { padding: 8px 16px; background: var(--accent); color: #0b1020; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .btn:disabled { opacity: 0.5; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div style="font-weight:bold">uno-reverse</div>
      <div class="status">
        <div id="statusDot" class="dot"></div>
        <span id="statusText">Connecting…</span>
      </div>
    </div>
    <div class="grid">
      <div class="card">
        <div style="padding:10px; border-bottom:1px solid var(--border)">Pending (<span id="count">0</span>)</div>
        <div id="list" class="list"></div>
      </div>
      <div class="card">
        <div id="chat" class="chat-body" style="display:flex; flex-direction:column"></div>
        <div class="composer">
          <textarea id="reply" placeholder="Type AI response..." disabled></textarea>
          <div style="margin-top:8px; text-align:right">
            <button id="send" class="btn" disabled>Send Reply</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
    const listEl = document.getElementById('list');
    const chatEl = document.getElementById('chat');
    const replyEl = document.getElementById('reply');
    const sendBtn = document.getElementById('send');
    const countEl = document.getElementById('count');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');

    let items = new Map();
    let selectedId = null;
    let ws;

    function render() {
      const arr = [...items.values()].filter(i => !i.done).sort((a,b) => b.at - a.at);
      countEl.textContent = arr.length;
      listEl.innerHTML = arr.map(i => `
        <div class="item ${i.id === selectedId ? 'active' : ''}" onclick="select('${i.id}')">
          <div style="font-size:12px; opacity:0.7">${i.id}</div>
          <div style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis">${i.prompt}</div>
        </div>
      `).join('');

      const sel = items.get(selectedId);
      if (sel && !sel.done) {
        chatEl.innerHTML = `<div class="bubble user">${sel.prompt}</div>`;
        replyEl.disabled = false;
        sendBtn.disabled = false;
      } else {
        chatEl.innerHTML = '<div style="text-align:center; margin-top:50px; opacity:0.5">Select a request</div>';
        replyEl.disabled = true;
        sendBtn.disabled = true;
        replyEl.value = '';
      }
    }

    window.select = (id) => { selectedId = id; render(); };

    sendBtn.onclick = () => {
      const text = replyEl.value.trim();
      if (!text || !selectedId) return;
      ws.send(JSON.stringify({ type: 'reply', id: selectedId, content: text }));
      replyEl.value = '';
    };

    function connect() {
      ws = new WebSocket((location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host);
      ws.onopen = () => { statusDot.className = 'dot connected'; statusText.textContent = 'Connected'; };
      ws.onclose = () => { statusDot.className = 'dot'; statusText.textContent = 'Disconnected'; setTimeout(connect, 2000); };
      ws.onmessage = (e) => {
        const m = JSON.parse(e.data);
        if (m.type === 'pending_list') { m.data.forEach(i => items.set(i.id, { ...i, at: Date.now() })); }
        if (m.type === 'incoming') { items.set(m.id, { ...m, at: Date.now() }); if (!selectedId) selectedId = m.id; }
        if (['answered', 'expired', 'client_disconnected'].includes(m.type)) {
          const it = items.get(m.id); if(it) it.done = true;
          if(selectedId === m.id) selectedId = [...items.values()].find(i => !i.done)?.id || null;
        }
        render();
      };
    }
    connect();
  </script>
</body>
</html>
